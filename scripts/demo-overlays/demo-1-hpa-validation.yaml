# Applied by scripts/run-autoscaling-demo.sh during the automated local validation run (after core Demo 1 manifests).
# Aggressive HPA tuning for faster, more deterministic automated demo validation (not for production demos).
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: demo-1-cpu-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: demo-1-cpu-hpa
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 20
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Pods
          value: 2
          periodSeconds: 15
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 15
