apiVersion: apps/v1
kind: Deployment
metadata:
  name: producer
  namespace: demo-2-redpanda-keda
  labels:
    app: producer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: producer
  template:
    metadata:
      labels:
        app: producer
    spec:
      containers:
        - name: producer
          image: demo-2-producer:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: BROKERS
              value: redpanda:9092
            - name: TOPIC
              value: demo-work
            - name: PORT
              value: "8080"
            - name: DEFAULT_WORK_UNITS
              value: "50000"
            - name: DEFAULT_BURST_COUNT
              value: "1000"
